appId: com.bloumechat.app
productName: BloumeChat
copyright: Copyright © 2026 Bloume SAS
directories:
  output: dist
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
      - config.json
extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/icon.icns
    to: icon.icns
publish:
  provider: github
  owner: JulesZYTB
  repo: bloumechat-app
win:
  publisherName: "Bloume SAS"
  signingHashAlgorithms:
    - sha256
  target:
    - nsis
  artifactName: "${productName}-Setup-${version}.${ext}"
appx:
  artifactName: "${productName}-Setup-${version}.${ext}"
  identityName: com.bloumechat.app
  publisher: "CN=Bloume SAS, O=Bloume SAS, L=Paris, C=FR"
  languages:
    - fr-FR
    - en-US
nsis:
  artifactName: "${productName}-Setup-${version}.${ext}"
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BloumeChat
  license: resources/LICENSE.txt
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
